<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Créditos</title>
</head>
<body>

<header>
  <h1>Sistema Básico de Créditos</h1>
   <link rel="stylesheet" href="simulador_completo.css">
</header>
<nav>
  <button onclick="mostrarSeccion('parametros');">Parámetros</button>
  <button onclick="mostrarSeccion('clientes');">Clientes</button>
  <button onclick="mostrarSeccion('creditos');">Créditos</button>
</nav>

<section id="parametros">
  <h2>Configurar Parámetros</h2>

  <label>Tasa de interés:</label>
  <input type="number" id="tasaInteres" min="10" max="20" value="15">
  <span>%</span>

  <br>
  <button onclick="guardarTasa();">Guardar tasa</button>

  <p id="mensajeTasa"></p>
</section>

<section id="clientes">
  <h2>Registro de Clientes</h2>

  <input type="text" id="idCedula" placeholder="Cedula">
  <input type="text" id="idNombre" placeholder="Nombre">
  <input type="text" id="idApellido" placeholder="Apellido">
  <input type="text" id="idIngresos" placeholder="Ingresos">
  <input type="text" id="idEgresos" placeholder="Egresos">
 
  <br>

  <button onclick="guardarCliente();">Guardar cliente</button>
  <button onclick="limpiar();">Limpiar</button>
  <button onclick="buscarClienteBoton()";> Buscar</button>

  <table>
    <thead>
      <tr>
        <th>Cédula</th>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Ingresos</th>
        <th>Egresos</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tablaClientes">
  
    </tbody>
  </table>
</section>

<section id="creditos">
  <h2> Solicitar Crédito</h2>
  <input type="text" id="buscarCedulaCredito" placeholder="Cedula">
  <button onclick="buscarClienteCredito();">Buscar cliente</button>
  
  <div id="datosClienteCredito" class="card"></div>
  <input type="number" id="montoCredito" placeholder="Monto Credito">
  <input type="number" id="plazoCredito" placeholder="Plazo Credito">
  <input type="number" id="interes" placeholder="Interes"/>
  <br>
  <button onclick="calcularCredito()">Calcular crédito</button>
  <div id="resultadoCredito" class="resultadoC"></div>
  
  <button id="btnSolicitarCredito" onclick="solicitarCredito()" disabled>
    Solicitar crédito
  </button>
</section>



<script src="simulador_completo.js"></script>
<script src="utilitarios.js"></script>

</body>
</html>
